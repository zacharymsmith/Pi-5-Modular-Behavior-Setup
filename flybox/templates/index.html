<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlyBox Controller</title>
<style>
  :root { --bg:#0f1115; --card:#1a1e26; --line:#2a3140; --fg:#e6e9ef; --muted:#8b93a7;
          --blue:#4f7cff; --green:#2ec27e; --red:#e5484d; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:baseline;}
  header h1 { font-size:18px; margin:0; }
  #hw { color:var(--muted); font-size:12px; }
  main { display:grid; grid-template-columns:minmax(320px,1fr) 1fr; gap:16px; padding:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card h2 { margin:0 0 12px; font-size:14px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  img#preview { width:100%; border-radius:8px; background:#000; aspect-ratio:4/3; object-fit:contain; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input[type=number] { width:100%; padding:8px; background:#0d1017; border:1px solid var(--line);
                       border-radius:6px; color:var(--fg); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  button { cursor:pointer; border:0; border-radius:7px; padding:10px 14px; font-weight:600; color:#fff; }
  .b-blue{background:var(--blue)} .b-green{background:var(--green)} .b-red{background:var(--red)}
  .b-ghost{background:#222a38} .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .slider{display:flex;align-items:center;gap:10px;margin:8px 0}
  .slider input{flex:1}
  #status{font-size:13px;color:var(--muted);white-space:pre-wrap;margin-top:8px}
  select{padding:8px;background:#0d1017;border:1px solid var(--line);border-radius:6px;color:var(--fg);width:100%}
  small{color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🪰 FlyBox Controller</h1>
  <span id="hw">connecting…</span>
</header>
<main>
  <!-- LEFT: camera -->
  <section class="card">
    <h2>Camera</h2>
    <img id="preview" src="/stream.mjpg" alt="live preview">
    <div class="row">
      <button class="b-green" onclick="rec(true)">● Record</button>
      <button class="b-red" onclick="rec(false)">■ Stop</button>
      <span id="recinfo"><small>not recording</small></span>
    </div>
  </section>

  <!-- RIGHT: controls -->
  <div style="display:flex;flex-direction:column;gap:16px">
    <section class="card">
      <h2>Optogenetics protocol</h2>
      <label>Channel</label>
      <select id="channel"></select>
      <div class="grid2">
        <div><label>Frequency (Hz)</label><input id="freq" type="number" value="20" min="0"></div>
        <div><label>Pulse width (ms)</label><input id="pw" type="number" value="10" min="0"></div>
        <div><label>Burst duration (s)</label><input id="train" type="number" value="2" min="0"></div>
        <div><label>Rest between (s)</label><input id="rest" type="number" value="5" min="0"></div>
        <div><label># Bursts</label><input id="reps" type="number" value="5" min="1"></div>
        <div><label>Intensity (0–1)</label><input id="intensity" type="number" value="1" min="0" max="1" step="0.05"></div>
        <div style="align-self:end"><small id="duty">duty: —</small></div>
      </div>
      <div class="row">
        <button class="b-blue" onclick="runOpto()">▶ Run</button>
        <button class="b-red" onclick="stopOpto()">⏹ Stop</button>
      </div>
      <div id="status">idle</div>
    </section>

    <section class="card">
      <h2>Illumination</h2>
      <div id="lights"></div>
      <div class="row"><button class="b-ghost" onclick="lightsOff()">All lights off</button></div>
      <h2 style="margin-top:16px">Channel discovery</h2>
      <small>Wiring jumbled? Toggle a raw PCA9685 channel and watch what lights up,
      then set LIGHT_CHANNELS in config.py.</small>
      <div class="slider">
        <span>ch</span><input id="rawch" type="number" value="0" min="0" max="15" style="width:70px">
        <button class="b-ghost" onclick="raw(1)">On</button>
        <button class="b-ghost" onclick="raw(0)">Off</button>
      </div>
    </section>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const post = (u, b) => fetch(u, {method:'POST', headers:{'Content-Type':'application/json'},
                                 body: b ? JSON.stringify(b) : null}).then(r=>r.json());

function updateDuty(){
  const f=+$('freq').value, pw=+$('pw').value;
  const duty = f>0 ? (pw/(1000/f)*100) : 100;
  $('duty').textContent = 'duty: ' + duty.toFixed(1) + '%' + (duty>100 ? ' ⚠ pulse > period':'');
}
['freq','pw'].forEach(id=>$(id).addEventListener('input', updateDuty));

function proto(){ return {frequency_hz:+$('freq').value, pulse_width_ms:+$('pw').value,
  train_duration_s:+$('train').value, rest_s:+$('rest').value, n_bursts:+$('reps').value,
  channel:$('channel').value, intensity:+$('intensity').value}; }

async function runOpto(){ const r=await post('/api/opto/run', proto());
  if(!r.ok) $('status').textContent = '⚠ ' + r.error; }
function stopOpto(){ post('/api/opto/stop'); }
function lightsOff(){ post('/api/light/off'); }
function raw(on){ post('/api/light/raw', {channel:+$('rawch').value, level:on}); }
async function rec(on){ const r=await post(on?'/api/record/start':'/api/record/stop');
  $('recinfo').innerHTML = '<small>'+(on?('recording → '+(r.path||'')):('saved '+(r.path||'')))+'</small>'; }

function setLight(name, level){ post('/api/light', {name, level}); }

let built=false;
async function poll(){
  const s = await fetch('/api/status').then(r=>r.json());
  $('hw').textContent = `cam:${s.camera.message} · opto:${s.opto.message}`;
  $('status').textContent = s.opto.running ? ('● '+s.opto.message) : s.opto.message;
  if(!built){
    $('channel').innerHTML = s.opto_channels.map(c=>`<option>${c}</option>`).join('');
    $('lights').innerHTML = s.light_names.map(n=>`
      <div class="slider"><span style="width:56px">${n}</span>
      <input type="range" min="0" max="1" step="0.01" value="0"
             oninput="setLight('${n}', this.value)"></div>`).join('');
    built=true;
  }
}
updateDuty(); poll(); setInterval(poll, 1500);
</script>
</body>
</html>
